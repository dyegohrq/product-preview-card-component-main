<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="style/style.css">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

</head>
<body>
  <div id="main-container">

    <picture class="img">
      <source media="(min-width: 1000px)" srcset="../images/image-product-desktop.jpg">
      <img src="images/image-product-mobile.jpg" alt="">
    </picture>

    <div class="container">
    
      <h2>Perfume</h2>
    
      <div>
        <h1>Gabrielle Essence Eau De Parfum</h1>
      </div>
      <p>
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>
      <div id="price">
        <span>$149.99</span>
        <small>$169.99</small>
      </div>

      <button id="submit-button"><i><img src="images/icon-cart.svg" alt="icon-cart"></i> <span>Add to Cart</span></button>

    </div>
  </div>
    
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href= "https://github.com/dyegohrq/product-preview-card-component-main" target="_blank">Dyego Henrique</a>.
    </div>
</body>
</html>
